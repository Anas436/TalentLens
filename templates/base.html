<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TalentLens{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <i class="fas fa-robot text-indigo-600 text-xl"></i>
                        <span class="font-semibold text-xl text-gray-800">TalentLens</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user.is_authenticated %}
                        <span class="text-sm text-gray-600">Hello, {{ user.username }}</span>
                        <a href="{% url 'core:logout' %}" class="text-sm text-gray-600 hover:text-indigo-600 transition-colors">
                            <i class="fas fa-sign-out-alt mr-1"></i>Sign Out
                        </a>
                    {% else %}
                        <a href="{% url 'core:login' %}" class="text-sm text-gray-600 hover:text-indigo-600 transition-colors">
                            <i class="fas fa-sign-in-alt mr-1"></i>Sign In
                        </a>
                        <a href="{% url 'core:signup' %}" class="text-sm bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                            Sign Up
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
